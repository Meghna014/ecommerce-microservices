name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:

  # ─────────────────────────────────────────
  # STAGE 1 — BUILD & TEST (CI)
  # ─────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: |
          for dir in eureka-server config-server api-gateway customer-service product-service price-service cart-service order-service notification-service; do
            echo "========== Building $dir =========="
            cd $dir && mvn clean package -DskipTests && cd ..
          done


      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-files
          path: '**/target/*.jar'
          retention-days: 1

  # ─────────────────────────────────────────
  # STAGE 2 — DOCKER BUILD & PUSH (CI)
  # ─────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR files for Docker
        run: |
          for dir in eureka-server config-server api-gateway customer-service product-service price-service cart-service order-service notification-service; do
            cd $dir && mvn clean package -DskipTests && cd ..
          done

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push all Docker images
        run: |
          SERVICES=(
            "eureka-server"
            "config-server"
            "api-gateway"
            "customer-service"
            "product-service"
            "price-service"
            "cart-service"
            "order-service"
            "notification-service"
          )
          for service in "${SERVICES[@]}"; do
            echo "========== Docker build & push: $service =========="
            docker build -t $DOCKER_USERNAME/ecommerce-$service:latest \
                         -t $DOCKER_USERNAME/ecommerce-$service:${{ github.sha }} \
                         ./$service
            docker push $DOCKER_USERNAME/ecommerce-$service:latest
            docker push $DOCKER_USERNAME/ecommerce-$service:${{ github.sha }}
          done

  # ─────────────────────────────────────────
  # STAGE 3 — DEPLOY & HEALTH CHECK (CD)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy & Health Check
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start all services with Docker Compose
        run: |
          docker compose up -d
          echo "Waiting 60s for services to start..."
          sleep 60

      - name: Health check — all services
        run: |
          declare -A SERVICES=(
            ["eureka-server"]="8761"
            ["config-server"]="8888"
            ["api-gateway"]="8080"
            ["customer-service"]="8081"
            ["product-service"]="8082"
            ["price-service"]="8084"
            ["cart-service"]="8086"
            ["order-service"]="8087"
            ["notification-service"]="8088"
          )

          FAILED=()
          for service in "${!SERVICES[@]}"; do
            port="${SERVICES[$service]}"
            echo "Checking $service on port $port..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:$port/actuator/health || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "✅ $service — healthy"
            else
              echo "❌ $service — status $STATUS"
              FAILED+=($service)
            fi
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "FAILED services: ${FAILED[@]}"
            exit 1
          fi

          echo "All services healthy!"

      - name: Show running containers
        run: docker ps

      - name: Show Eureka registered services
        run: |
          curl -s http://localhost:8761/eureka/apps \
            -H "Accept: application/json" | python3 -m json.tool || true

      - name: Tear down after verification
        if: always()
        run: docker compose down