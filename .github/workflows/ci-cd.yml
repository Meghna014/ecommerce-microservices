name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:

  # ─────────────────────────────────────────
  # STAGE 1 — BUILD (CI)
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: |
          for dir in eureka-server config-server api-gateway customer-service product-service price-service cart-service order-service notification-service; do
            echo "========== Building $dir =========="
            cd $dir && mvn clean package -DskipTests && cd ..
          done

  # ─────────────────────────────────────────
  # STAGE 2 — DOCKER BUILD & PUSH (CI)
  # Maven build runs here too because
  # target/ folder does not persist across jobs
  # ─────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR files
        run: |
          for dir in eureka-server config-server api-gateway customer-service product-service price-service cart-service order-service notification-service; do
            echo "========== Building $dir =========="
            cd $dir && mvn clean package -DskipTests && cd ..
          done

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push all Docker images
        run: |
          SERVICES=(
            "eureka-server"
            "config-server"
            "api-gateway"
            "customer-service"
            "product-service"
            "price-service"
            "cart-service"
            "order-service"
            "notification-service"
          )
          for service in "${SERVICES[@]}"; do
            echo "========== Docker build & push: $service =========="
            docker build -t $DOCKER_USERNAME/ecommerce-$service:latest \
                         -t $DOCKER_USERNAME/ecommerce-$service:${{ github.sha }} \
                         ./$service
            docker push $DOCKER_USERNAME/ecommerce-$service:latest
            docker push $DOCKER_USERNAME/ecommerce-$service:${{ github.sha }}
          done

  # ─────────────────────────────────────────
  # STAGE 3 — DEPLOY & HEALTH CHECK (CD)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy & Health Check
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR files for Docker Compose
        run: |
          for dir in eureka-server config-server api-gateway customer-service product-service price-service cart-service order-service notification-service; do
            echo "========== Building $dir =========="
            cd $dir && mvn clean package -DskipTests && cd ..
          done

      - name: Start all services with Docker Compose
        run: |
          docker compose up -d --build
          echo "Waiting 90s for all services to start..."
          sleep 90

      - name: Health check — verify all containers are running
        run: |
          echo "===== Running containers ====="
          docker ps

          SERVICES=(
            "eureka-server"
            "config-server"
            "api-gateway"
            "customer-service"
            "product-service"
            "price-service"
            "cart-service"
            "order-service"
            "notification-service"
          )

          FAILED=()
          for service in "${SERVICES[@]}"; do
            STATUS=$(docker inspect --format='{{.State.Running}}' $service 2>/dev/null)
            if [ "$STATUS" == "true" ]; then
              echo "✅ $service — running"
            else
              echo "❌ $service — not running"
              FAILED+=($service)
            fi
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "Failed services: ${FAILED[@]}"
            exit 1
          fi

          echo "All 9 services running successfully!"

      - name: Show final container status
        run: docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Tear down after verification
        if: always()
        run: docker compose down