spring.application.name=product-service


server.port=8082

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.compatibility-verifier.enabled=false

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/product_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always


# Circuit Breaker config
resilience4j.circuitbreaker.instances.priceService.sliding-window-size=5
resilience4j.circuitbreaker.instances.priceService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.priceService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.priceService.permitted-number-of-calls-in-half-open-state=3


# Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

